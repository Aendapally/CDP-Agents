    description: Event Bus
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: elasticsearch
    name: Elasticsearch
    type: aws.analytics.ElasticsearchService
    description: Search and Analytics
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: users
