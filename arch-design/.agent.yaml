  #   transport: streamable_http
  #   url: "http://localhost:8001/mcp-bearer"
  #   auth:
  #     type: bearer
  #     token_env: TEST_BEARER_TOKEN
  #   headers:
  #     User-Agent: "TestAgent/1.0"

  # API Key test server 
