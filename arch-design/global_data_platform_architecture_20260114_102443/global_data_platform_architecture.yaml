    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: dax
    name: DAX
    type: aws.database.DAX
    description: DynamoDB Accelerator
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: s3
    name: S3
