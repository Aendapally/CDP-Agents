    description: Container Registry
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: sqs
    name: SQS
    type: aws.integration.SQS
    description: Message Queue
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: sns
    name: SNS
    type: aws.integration.SNS
    description: Pub/Sub Messaging
    relates:
    - to: cloudwatch
      direction: outgoing
      label: Monitoring
  - id: internet
    name: Internet
    type: generic.network.Internet
    description: Public Internet
    relates:
    - to: transit_gateway
      direction: outgoing
      label: Network Flow
  - id: users
